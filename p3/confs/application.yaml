apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/darambae/inception-of-things-dabae.git'
    targetRevision: HEAD
    path: p3/confs
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      selfHeal: true
      prune: true 